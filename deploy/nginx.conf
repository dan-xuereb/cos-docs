# cos-docs/deploy/nginx.conf
# nginx config for the cos-docs static site. Serves a pre-built mkdocs Material
# site/ tree. Supports use_directory_urls=True (mkdocs default) via try_files.
# Exposes /health for k8s liveness/readiness probes.
# Runs as non-root (UID 101) -- listen on 8080 so <1024 bind is not required.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static docs; no upstream services, safe to enable long cache on hashed assets.
    # Material emits filenames without content hashes though -- use conservative defaults.
    add_header Cache-Control "no-cache";

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Directory-URL serving: try /foo, /foo/, /foo/index.html, else return
    # 404 (caught by error_page below to serve the themed /404.html with
    # correct HTTP 404 status; falling through to /404.html as a URI would
    # serve it with HTTP 200).
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Serve MkDocs' auto-generated 404 page for anything missed.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
